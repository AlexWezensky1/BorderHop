<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  <!-- Two state-like regions divided by a border -->
  <rect x="8" y="16" width="22" height="32" rx="3" fill="#70CCD9" opacity="0.9"/>
  <rect x="34" y="16" width="22" height="32" rx="3" fill="#77C043" opacity="0.9"/>
  <!-- Dividing border line -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="white" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Hop arrow across the border -->
  <path d="M18 32 Q32 18 46 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
